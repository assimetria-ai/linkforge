# @system/testing — GitHub Actions CI Template
#
# Copy to .github/workflows/test.yml in your product repo.
# Runs unit tests, API tests, and E2E tests on every push/PR.

name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  TEST_DATABASE_URL: postgresql://test:test@localhost:5433/test
  TEST_REDIS_URL: redis://localhost:6380
  CI: true

jobs:
  unit-and-api:
    name: Unit & API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Run migrations
        run: cd server && node -e "require('./testing/@system/helpers/db-seed').runMigrations(require('./testing/@system/helpers/db-seed').createTestDb())"

      - name: Run unit tests
        run: npx jest --project unit --coverage

      - name: Run API tests
        run: npx jest --project api

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-and-api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd server && npm ci
          cd ../client && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed test database
        run: bash testing/@system/scripts/seed-db.sh

      - name: Start server
        run: cd server && npm start &
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
          REDIS_URL: ${{ env.TEST_REDIS_URL }}
          JWT_SECRET: test-jwt-secret
          PORT: 3000

      - name: Start client
        run: cd client && npm run preview &
        env:
          PORT: 5173

      - name: Wait for services
        run: |
          npx wait-on http://localhost:3000/api/health http://localhost:5173 --timeout 30000

      - name: Run E2E tests
        run: npx playwright test --project chromium
        env:
          BASE_URL: http://localhost:5173
          API_URL: http://localhost:3000

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/

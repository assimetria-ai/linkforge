<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" width="280" height="56">
  <!-- Icon mark + wordmark for light backgrounds (dark text, brand color mark) -->
  <defs>
    <clipPath id="lf-wml-left">
      <rect x="0" y="0" width="22" height="56"/>
    </clipPath>
    <clipPath id="lf-wml-right">
      <rect x="22" y="0" width="22" height="56"/>
    </clipPath>
  </defs>

  <!-- Ring 2 (cyan) right portion -->
  <g clip-path="url(#lf-wml-right)">
    <g transform="translate(22,28) rotate(45)">
      <rect x="-12" y="-4.7" width="24" height="9.4" rx="3.4"
            fill="none" stroke="#06B6D4" stroke-width="3.4"/>
    </g>
  </g>

  <!-- Ring 1 (violet) full -->
  <g transform="translate(22,28) rotate(-45)">
    <rect x="-12" y="-4.7" width="24" height="9.4" rx="3.4"
          fill="none" stroke="#8B5CF6" stroke-width="3.4"/>
  </g>

  <!-- Ring 2 (cyan) left portion — in front -->
  <g clip-path="url(#lf-wml-left)">
    <g transform="translate(22,28) rotate(45)">
      <rect x="-12" y="-4.7" width="24" height="9.4" rx="3.4"
            fill="none" stroke="#06B6D4" stroke-width="3.4"/>
    </g>
  </g>

  <!-- "LinkForge" text in dark -->
  <text x="52" y="37"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="26" font-weight="700" letter-spacing="-0.5"
        fill="#111827">LinkForge</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" width="280" height="56">
  <!-- Icon mark + wordmark for dark backgrounds (white) -->
  <defs>
    <clipPath id="lf-wmd-left">
      <rect x="0" y="0" width="22" height="56"/>
    </clipPath>
    <clipPath id="lf-wmd-right">
      <rect x="22" y="0" width="22" height="56"/>
    </clipPath>
  </defs>

  <!-- Ring 2 (white, slightly transparent) right portion -->
  <g clip-path="url(#lf-wmd-right)">
    <g transform="translate(22,28) rotate(45)">
      <rect x="-12" y="-4.7" width="24" height="9.4" rx="3.4"
            fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="3.4"/>
    </g>
  </g>

  <!-- Ring 1 (white) full -->
  <g transform="translate(22,28) rotate(-45)">
    <rect x="-12" y="-4.7" width="24" height="9.4" rx="3.4"
          fill="none" stroke="#FFFFFF" stroke-width="3.4"/>
  </g>

  <!-- Ring 2 (white, slightly transparent) left portion -->
  <g clip-path="url(#lf-wmd-left)">
    <g transform="translate(22,28) rotate(45)">
      <rect x="-12" y="-4.7" width="24" height="9.4" rx="3.4"
            fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="3.4"/>
    </g>
  </g>

  <!-- "LinkForge" text in white -->
  <text x="52" y="37"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="26" font-weight="700" letter-spacing="-0.5"
        fill="#FFFFFF">LinkForge</text>
</svg>

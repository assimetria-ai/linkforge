<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Enhanced mobile viewport settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />

    <!-- iOS-specific meta tags for PWA-like experience -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Linkforge" />

    <!-- Android/Chrome mobile app configuration -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#3A8BFD" />
    <meta name="color-scheme" content="light dark" />

    <!-- Disable auto-detection of phone numbers (prevents unwanted links) -->
    <meta name="format-detection" content="telephone=no" />

    <title>Linkforge — Links engineered to convert</title>

    <!-- @system: OG / social meta tags — static fallbacks for crawlers that don't run JS -->
    <meta name="description" content="Link management for modern marketing teams." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Linkforge — Links engineered to convert" />
    <meta property="og:description" content="Link management for modern marketing teams." />
    <meta property="og:url" content="https://linkforge.app" />
    <meta property="og:image" content="https://linkforge.app/og-image.png" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Linkforge — Links engineered to convert" />
    <meta name="twitter:description" content="Link management for modern marketing teams." />
    <meta name="twitter:url" content="https://linkforge.app" />
    <meta name="twitter:image" content="https://linkforge.app/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
